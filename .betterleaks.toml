# Betterleaks configuration

# Keep all default rules; this config only adds allowlists.
# (Without useDefault the default ruleset would be replaced and nothing would be scanned.)
[extend]
useDefault = true

[[allowlists]]
description = "Example/test certificates and their generation scripts (intentional placeholders, no real secrets, not used in production)."
paths = [
    '''Other/ServerMaintenance/Common/GenerateCertificates/''',
]
