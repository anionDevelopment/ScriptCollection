name: buildpipeline
on:
  workflow_dispatch:
    inputs:
      TargetEnvironmentType:
        description: "Target environment-type for the build (e.g. QualityCheck, Productive)."
        required: false
        default: QualityCheck
jobs:
  build-pipeline:
    runs-on: [self-hosted, scriptcollection]
    container:
      image: aniondev/scbuilder:v1.2.5
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: update apt (temporary)
        run: apt update
      - name: install graphviz (temporary)
        run: apt install graphviz -y
      - name: Update scriptcollection (temporary)
        run: pip3 install scriptcollection --upgrade
      - name: Show scversion (temporary)
        run: scshowversion
      - name: Prepare build-pipeline
        run: scpreparebuildpipelineforgitlab
      - name: Build codeunits
        run: scbuildcodeunits -v 4 -e "${{ inputs.TargetEnvironmentType }}" --assertnonewchanges
      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            ScriptCollection/Other/Artifacts
          if-no-files-found: error
